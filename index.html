<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>SewPro — Machine Catalog</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

        /* ── Language Switcher ── */
        .lang-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: #1e293b; border-bottom: 1px solid #334155;
            display: flex; align-items: center; justify-content: flex-end;
            padding: 8px 24px; gap: 8px;
        }
        .lang-btn {
            padding: 6px 16px; border-radius: 6px; border: 1px solid #475569;
            background: transparent; color: #94a3b8; font-size: 0.8rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .lang-btn:hover { border-color: #f97316; color: #e2e8f0; }
        .lang-btn.active { background: #f97316; color: white; border-color: #f97316; }

        /* ── Sidebar ── */
        .sidebar {
            width: 320px; min-width: 320px; background: #1e293b; border-right: 1px solid #334155;
            display: flex; flex-direction: column; overflow: hidden; margin-top: 44px;
        }
        .sidebar-header {
            padding: 20px 24px; border-bottom: 1px solid #334155;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-header .logo { width: 36px; height: 36px; background: #f97316; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 18px; }
        .sidebar-header h1 { font-size: 1.2rem; font-weight: 700; color: #f8fafc; }
        .sidebar-header h1 span { color: #f97316; }

        .sidebar-list { flex: 1; overflow-y: auto; padding: 12px; }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .group-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: #64748b; padding: 16px 12px 6px;
        }
        .btn-item {
            display: flex; align-items: center; gap: 12px; width: 100%;
            padding: 12px 16px; background: transparent; border: none;
            color: #94a3b8; font-size: 0.9rem; font-weight: 500;
            border-radius: 10px; cursor: pointer; transition: all 0.2s;
            text-align: left;
        }
        .btn-item:hover { background: #334155; color: #e2e8f0; }
        .btn-item.active { background: #f97316; color: #fff; font-weight: 600; }
        .btn-item .icon { font-size: 1.2rem; width: 28px; text-align: center; }
        .btn-sub { padding-left: 48px; font-size: 0.83rem; color: #64748b; }
        .btn-sub:hover { color: #e2e8f0; }
        .btn-sub.active { background: rgba(249,115,22,0.15); color: #fb923c; }

        /* ── Main ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-top: 44px; }
        .main-header {
            padding: 20px 32px; border-bottom: 1px solid #1e293b; background: #0f172a;
        }
        .main-header h2 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; }
        .main-header p { color: #64748b; font-size: 0.9rem; margin-top: 4px; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px; overflow: auto; }

        .image-panel {
            max-width: 900px; width: 100%; background: #1e293b; border-radius: 16px;
            overflow: hidden; border: 1px solid #334155; animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .image-panel img { width: 100%; max-height: 500px; object-fit: cover; display: block; }
        .image-panel .info { padding: 24px 28px; }
        .image-panel .info h3 { font-size: 1.3rem; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
        .image-panel .info p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; }
        .image-panel .specs { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .image-panel .specs span {
            background: #334155; color: #e2e8f0; padding: 5px 14px;
            border-radius: 50px; font-size: 0.8rem; font-weight: 500;
        }
        .placeholder { text-align: center; color: #475569; }
        .placeholder .big-icon { font-size: 4rem; margin-bottom: 16px; }

        @media (max-width: 768px) {
            .sidebar { width: 260px; min-width: 260px; }
        }
    </style>
</head>

const icons = {
    plotter: '📐', spreading: '📏', autocutter: '✂️', endcutter: '🔪',
    'single-needle': '🧵', 'overlock-4t': '', 'overlock-5t': '',
    'interlock-flat': '', 'interlock-cylinder': '',
    buttonholer: '', 'button-attach': '', bartack: '', keyhole: ''
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentLang = 'en';
let currentMachine = null;

// ═══════════════════════════════════════
// SIDEBAR ORDER
// ═══════════════════════════════════════
const sidebarOrder = [
    { group: 'cadcam', items: ['plotter'] },
    { group: 'cutting', items: ['spreading', 'autocutter', 'endcutter'] },
    { group: 'sewing', items: ['single-needle'] },
    { group: 'overlock', items: ['overlock-4t', 'overlock-5t'], sub: true },
    { group: 'interlock', items: ['interlock-flat', 'interlock-cylinder'], sub: true },
    { group: 'special', items: ['buttonholer', 'button-attach', 'bartack', 'keyhole'], sub: true }
];

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderSidebar() {
    const lang = t[currentLang];
    const sidebar = document.getElementById('sidebar');
    let html = '';

    sidebarOrder.forEach(section => {
        html += `<div class="group-label">${lang.groups[section.group]}</div>`;
        section.items.forEach(id => {
            const m = lang.machines[id];
            const cls = section.sub ? 'btn-item btn-sub' : 'btn-item';
            const active = currentMachine === id ? ' active' : '';
            const icon = icons[id] ? `<span class="icon">${icons[id]}</span>` : '';
            html += `<button class="${cls}${active}" onclick="show('${id}')">${icon}${m.label}</button>`;
        });
    });

    sidebar.innerHTML = html;
    document.getElementById('placeholder-text').textContent = lang.clickPrompt;
}

function show(id) {
    const lang = t[currentLang];
    const m = lang.machines[id];
    if (!m) return;

    currentMachine = id;
    renderSidebar();

    document.getElementById('title').textContent = m.title;
    document.getElementById('subtitle').textContent = m.subtitle;

    document.getElementById('content').innerHTML = `
        <div class="image-panel">
            <img src="${images[id]}" alt="${m.title}" loading="lazy">
            <div class="info">
                <h3>${m.title}</h3>
                <p>${m.desc}</p>
                <div class="specs">
                    ${m.specs.map(s => `<span>${s}</span>`).join('')}
                </div>
            </div>
        </div>
    `;
}

function setLang(lang) {
    currentLang = lang;
    // Update active button
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.lang-btn').forEach(b => {
        if (b.textContent.includes(lang === 'en' ? 'English' : lang === 'id' ? 'Indonesia' : '中文'))
            b.classList.add('active');
    });

    renderSidebar();

    // If a machine is selected, re-render it
    if (currentMachine) {
        show(currentMachine);
    } else {
        document.getElementById('title').textContent = 'Machine Catalog';
        document.getElementById('subtitle').textContent = t[lang].selectPrompt;
    }
}

// Initial render
renderSidebar();
</script>

</body>
</html>
